apiVersion: apps/v1
kind: Deployment
metadata:
  name: chert
  labels:
    app.kubernetes.io/name: chert
    app.kubernetes.io/component: standalone
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chert
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chert
        app.kubernetes.io/component: standalone
    spec:
      terminationGracePeriodSeconds: 40
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: chert
          image: chert-standalone-image
          imagePullPolicy: Always
          env:
            - name: CHERT_DB_URL
              value: jdbc:postgresql://10.10.1.141:5432/chert
            - name: CHERT_JPA_DDL_AUTO
              value: update
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 5
          startupProbe:
            httpGet:
              path: /api/actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
