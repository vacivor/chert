spring:
  application:
    name: chert-server
  datasource:
    url: ${CHERT_DB_URL:jdbc:postgresql://localhost:5432/chert}
    driver-class-name: org.postgresql.Driver
    username: ${CHERT_DB_USERNAME:postgres}
    password: ${CHERT_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${CHERT_JPA_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8080

chert:
  server:
    long-polling-timeout: 30s
    release-message-scan-interval: 1s


management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
