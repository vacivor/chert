spring:
  datasource:
    url: jdbc:h2:mem:chert-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

chert:
  server:
    long-polling-timeout: 1s
    release-message-scan-interval: 100ms
